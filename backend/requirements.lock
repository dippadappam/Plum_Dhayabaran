# Locked dependency versions — the exact, scoped dependency closure of this
# backend, frozen from the environment the 232-test suite passes on
# (Python 3.10.11). For a reproducible install of the known-good versions:
#
#     pip install -r requirements.lock
#
# This is the project's dependency closure only (not the whole dev machine):
# the direct deps from requirements.txt plus their transitive deps, pinned
# exactly. Regenerate after an intentional dependency change by re-freezing a
# known-good environment scoped to this closure.
#
# Platform note: frozen on win32, so uvloop (a non-Windows uvicorn[standard]
# extra) is not pinned here. uvloop is an optional event-loop speedup the app
# and tests do not require, so this lock installs and runs on Linux/macOS too.
